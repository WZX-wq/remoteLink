services:
  db:
    image: mysql:8.4
    container_name: kq-remote-link-db
    environment:
      MYSQL_DATABASE: ${KQ_DB_NAME:-kq_remote_link}
      MYSQL_USER: ${KQ_DB_USER:-kq_remote_link}
      MYSQL_PASSWORD: ${KQ_DB_PASSWORD:-kq_remote_link_local_password}
      MYSQL_ROOT_PASSWORD: ${KQ_DB_ROOT_PASSWORD:-kq_remote_link_local_root_password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:${KQ_DB_PORT:-23306}:3306"
    volumes:
      - kq_remote_link_mysql:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    restart: always
    profiles:
      - local-db

  api:
    image: kq-remote-link-api:latest
    build:
      context: ./api
    container_name: kq-remote-link-api
    env_file:
      - .env
    environment:
      KQ_API_HOST: 127.0.0.1
      KQ_API_PORT: ${KQ_API_PORT:-21120}
      KQ_PUBLIC_API_URL: ${KQ_PUBLIC_API_URL:-http://43.154.197.96/kq-api/api}
      KQ_DOWNLOAD_URL: ${KQ_DOWNLOAD_URL:-http://43.154.197.96/kq-api/download/windows}
      KQ_DOWNLOAD_FILE_PATH: ${KQ_DOWNLOAD_FILE_PATH:-/app/public/downloads/Kunqiong-Remote-Desktop-Setup.exe}
      KQ_DOWNLOAD_FILE_NAME: ${KQ_DOWNLOAD_FILE_NAME:-Kunqiong-Remote-Desktop-Setup.exe}
      KQ_DOWNLOAD_VERSION: ${KQ_DOWNLOAD_VERSION:-2026.06.05.1708}
      KQ_DOWNLOAD_SHA256: ${KQ_DOWNLOAD_SHA256:-1B357A0F1EF37572310DEF7F93386349F1471B8907DFF7957715A2DEC037BE9E}
      KQ_ANDROID_DOWNLOAD_URL: ${KQ_ANDROID_DOWNLOAD_URL:-http://43.154.197.96/kq-api/download/android}
      KQ_ANDROID_DOWNLOAD_FILE_PATH: ${KQ_ANDROID_DOWNLOAD_FILE_PATH:-/app/public/downloads/Kunqiong-Remote-Desktop.apk}
      KQ_ANDROID_DOWNLOAD_FILE_NAME: ${KQ_ANDROID_DOWNLOAD_FILE_NAME:-Kunqiong-Remote-Desktop.apk}
      KQ_ANDROID_DOWNLOAD_VERSION: ${KQ_ANDROID_DOWNLOAD_VERSION:-2026.06.08.93}
      KQ_ANDROID_DOWNLOAD_SHA256: ${KQ_ANDROID_DOWNLOAD_SHA256:-}
      KQ_DOWNLOAD_MAX_REQUESTS_PER_WINDOW: ${KQ_DOWNLOAD_MAX_REQUESTS_PER_WINDOW:-12}
      KQ_DOWNLOAD_RATE_WINDOW_MS: ${KQ_DOWNLOAD_RATE_WINDOW_MS:-60000}
      KQ_DOWNLOAD_MAX_PER_IP_CONCURRENT: ${KQ_DOWNLOAD_MAX_PER_IP_CONCURRENT:-2}
      KQ_DOWNLOAD_MAX_GLOBAL_CONCURRENT: ${KQ_DOWNLOAD_MAX_GLOBAL_CONCURRENT:-8}
      KQ_APP_SCHEME: ${KQ_APP_SCHEME:-kqremote}
      KQ_SUBSITE_NAME: ${KQ_SUBSITE_NAME:-https://remote.kunqiongai.com/}
      KQ_API_WEB_BASE_URL: ${KQ_API_WEB_BASE_URL:-https://api-web.kunqiongai.com}
      KQ_DB_POOL_SIZE: ${KQ_DB_POOL_SIZE:-2}
      KQ_WECHAT_PAY_APPID: ${KQ_WECHAT_PAY_APPID:-}
      KQ_WECHAT_PAY_MCHID: ${KQ_WECHAT_PAY_MCHID:-}
      KQ_WECHAT_PAY_MERCHANT_SERIAL_NO: ${KQ_WECHAT_PAY_MERCHANT_SERIAL_NO:-}
      KQ_WECHAT_PAY_PRIVATE_KEY: ${KQ_WECHAT_PAY_PRIVATE_KEY:-}
      KQ_WECHAT_PAY_PRIVATE_KEY_PATH: ${KQ_WECHAT_PAY_PRIVATE_KEY_PATH:-}
      KQ_WECHAT_PAY_API_V3_KEY: ${KQ_WECHAT_PAY_API_V3_KEY:-}
      KQ_WECHAT_PAY_NOTIFY_URL: ${KQ_WECHAT_PAY_NOTIFY_URL:-}
      KQ_WECHAT_PAY_API_BASE_URL: ${KQ_WECHAT_PAY_API_BASE_URL:-}
      KQ_ALIPAY_APP_ID: ${KQ_ALIPAY_APP_ID:-}
      KQ_ALIPAY_APPID: ${KQ_ALIPAY_APPID:-}
      KQ_ALIPAY_PRIVATE_KEY: ${KQ_ALIPAY_PRIVATE_KEY:-}
      KQ_ALIPAY_PRIVATE_KEY_PATH: ${KQ_ALIPAY_PRIVATE_KEY_PATH:-}
      KQ_ALIPAY_PUBLIC_KEY: ${KQ_ALIPAY_PUBLIC_KEY:-}
      KQ_ALIPAY_PUBLIC_KEY_PATH: ${KQ_ALIPAY_PUBLIC_KEY_PATH:-}
      KQ_ALIPAY_NOTIFY_URL: ${KQ_ALIPAY_NOTIFY_URL:-}
      KQ_ALIPAY_GATEWAY_URL: ${KQ_ALIPAY_GATEWAY_URL:-}
    volumes:
      - ./api/public/downloads:/app/public/downloads
    network_mode: host
    restart: always
    profiles:
      - api

  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: kq-remote-link-hbbs
    command: hbbs -r ${KQ_RELAY_SERVER:-43.154.197.96:21117}
    volumes:
      - ./data:/root
    network_mode: host
    depends_on:
      - hbbr
    restart: always

  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: kq-remote-link-hbbr
    command: hbbr
    volumes:
      - ./data:/root
    network_mode: host
    restart: always

volumes:
  kq_remote_link_mysql:
