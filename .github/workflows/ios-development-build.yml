name: iOS Development Signed IPA

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: Flutter build name
        required: false
        default: "1.4.6"
        type: string

permissions:
  contents: read

concurrency:
  group: ios-development-signed-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: "3.44.5"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-development-ipa:
    name: Build Development-Signed IPA
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: brew install nasm yasm

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup vcpkg with GitHub Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          set -euo pipefail
          "$VCPKG_ROOT/vcpkg" install --triplet arm64-ios --x-install-root="$VCPKG_ROOT/installed"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-ios

      - name: Import development signing assets
        shell: bash
        env:
          IOS_SIGNING_CERTIFICATE_BASE64: ${{ secrets.IOS_SIGNING_CERTIFICATE_BASE64 }}
          IOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.IOS_SIGNING_CERTIFICATE_PASSWORD }}
          IOS_MAIN_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_MAIN_PROVISIONING_PROFILE_BASE64 }}
          IOS_BROADCAST_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_BROADCAST_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077

          for secret_name in \
            IOS_SIGNING_CERTIFICATE_BASE64 \
            IOS_SIGNING_CERTIFICATE_PASSWORD \
            IOS_MAIN_PROVISIONING_PROFILE_BASE64 \
            IOS_BROADCAST_PROVISIONING_PROFILE_BASE64; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::Missing required signing secret: ${secret_name}"
              exit 1
            fi
          done

          signing_dir="$RUNNER_TEMP/ios-development-signing"
          keychain_path="$RUNNER_TEMP/ios-development-signing.keychain-db"
          mkdir -p "$signing_dir" "$HOME/Library/MobileDevice/Provisioning Profiles"

          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          signing_dir = Path(os.environ['RUNNER_TEMP']) / 'ios-development-signing'
          for variable, filename in (
              ('IOS_SIGNING_CERTIFICATE_BASE64', 'certificate.p12'),
              ('IOS_MAIN_PROVISIONING_PROFILE_BASE64', 'main.mobileprovision'),
              ('IOS_BROADCAST_PROVISIONING_PROFILE_BASE64', 'broadcast.mobileprovision'),
          ):
              (signing_dir / filename).write_bytes(base64.b64decode(os.environ[variable]))
          PY

          keychain_password="$(uuidgen)"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$signing_dir/certificate.p12" -k "$keychain_path" -P "$IOS_SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychain -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

          for profile in "$signing_dir"/*.mobileprovision; do
            uuid="$(security cms -D -i "$profile" | plutil -extract UUID raw -)"
            cp "$profile" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
          done

      - name: Build development-signed IPA
        shell: bash
        env:
          BUILD_NAME: ${{ inputs.build_name }}
        run: |
          set -euo pipefail
          if [[ ! "$BUILD_NAME" =~ ^[0-9]+(\.[0-9]+){0,2}$ ]]; then
            echo "::error::build_name must use a numeric dot-separated version, for example 1.4.6."
            exit 1
          fi

          export_options="$RUNNER_TEMP/ExportOptions-development.plist"
          cat > "$export_options" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>G4C3ADW2F4</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.kunqiong.remotelink</key>
              <string>RemoteLink Development 20260721</string>
              <key>com.kunqiong.remotelink.broadcast</key>
              <string>RemoteLink Broadcast Development 20260721</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          pushd flutter
          flutter pub get
          pushd ios
          pod install
          popd
          popd

          cargo build --features flutter,hwcodec --release --target aarch64-apple-ios --lib

          pushd flutter
          flutter build ipa --release \
            --build-name "$BUILD_NAME" \
            --build-number "${{ github.run_number }}" \
            --export-options-plist="$export_options"
          popd

      - name: Upload development IPA
        uses: actions/upload-artifact@v4
        with:
          name: KQRemoteLink-iOS-development-${{ github.run_number }}
          path: flutter/build/ios/ipa/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Remove signing assets
        if: always()
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/ios-development-signing.keychain-db" || true
          rm -rf "$RUNNER_TEMP/ios-development-signing"
