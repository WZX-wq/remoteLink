name: iOS Preflight Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  CARGO_EXPAND_VERSION: "1.0.95"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  FLUTTER_VERSION: "3.24.5"
  RUST_VERSION: "1.75"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  generate-bridge:
    name: Generate Flutter Rust Bridge
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install prerequisites
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            gcc \
            git \
            g++ \
            libclang-dev \
            libgtk-3-dev \
            llvm-dev \
            nasm \
            ninja-build \
            pkg-config \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ios-preflight-bridge

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter 3.24 dependency constraints
        working-directory: flutter
        run: |
          perl -0pi -e 's/extended_text: \^15\.0\.2/extended_text: 14.0.0/g' pubspec.yaml

      - name: Install Flutter Rust Bridge tools
        shell: bash
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          pushd flutter
          flutter pub get
          popd

      - name: Generate bridge files
        run: |
          ~/.cargo/bin/flutter_rust_bridge_codegen --rust-input ./src/flutter_ffi.rs --dart-output ./flutter/lib/generated_bridge.dart --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Verify generated bridge files are committed
        shell: bash
        run: |
          git diff --exit-code -- \
            ./src/bridge_generated.rs \
            ./src/bridge_generated.io.rs

          require_committed_symbol() {
            local file="$1"
            local symbol="$2"
            if ! git grep -q -- "$symbol" HEAD -- "${file#./}"; then
              echo "::error file=$file::Committed bridge file is missing $symbol."
              return 1
            fi
          }

          require_committed_symbol ./flutter/lib/generated_bridge.dart kq_ios_broadcast_start
          require_committed_symbol ./flutter/ios/Runner/bridge_generated.h kq_ios_broadcast_start

  flutter-compliance-tests:
    name: Flutter iOS Compliance Tests
    runs-on: ubuntu-22.04
    needs: generate-bridge
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter 3.24 dependency constraints
        working-directory: flutter
        run: |
          perl -0pi -e 's/extended_text: \^15\.0\.2/extended_text: 14.0.0/g' pubspec.yaml

      - name: Install dependencies
        working-directory: flutter
        run: flutter pub get

      - name: Analyze iOS purchase code
        working-directory: flutter
        run: dart analyze lib/mobile/pages/ios_membership_purchase_page.dart lib/mobile/kq_ios_in_app_purchase.dart

      - name: Run iOS compliance tests
        working-directory: flutter
        run: |
          flutter test \
            test/kq_ios_in_app_purchase_test.dart \
            test/kq_account_deletion_test.dart \
            test/kq_ios_privacy_policy_test.dart \
            test/kq_ios_release_policy_test.dart

  build-ios-no-codesign:
    name: Build iOS IPA Without Codesign
    runs-on: macos-latest
    needs:
      - generate-bridge
      - flutter-compliance-tests
    steps:
      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install dependencies
        run: brew install nasm yasm

      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Patch Flutter
        shell: bash
        run: |
          cd "$(dirname "$(dirname "$(which flutter)")")"
          git apply "${{ github.workspace }}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"

      - name: Setup vcpkg with GitHub Actions binary cache
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT_ID }}
          doNotCache: false

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          if ! "$VCPKG_ROOT/vcpkg" install --triplet arm64-ios --x-install-root="$VCPKG_ROOT/installed"; then
            find "$VCPKG_ROOT/" -name "*.log" -print -exec cat {} \;
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-ios
          components: rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ios-preflight-aarch64-apple-ios

      - name: Build Rust iOS library
        run: cargo build --features flutter,hwcodec --release --target aarch64-apple-ios --lib

      - name: Patch Flutter 3.24 dependency constraints
        working-directory: flutter
        run: |
          perl -0pi -e 's/extended_text: \^15\.0\.2/extended_text: 14.0.0/g' pubspec.yaml

      - name: Build Flutter IPA without codesign
        working-directory: flutter
        run: flutter build ipa --release --no-codesign
