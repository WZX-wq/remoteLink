workflows:
  kq-remote-link-ios-nosign:
    name: KQ Remote Link iOS - No Signing Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      vars:
        CARGO_TARGET: aarch64-apple-ios
        RUST_VERSION: "1.75"
        VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
        VCPKG_DIR: .codemagic/vcpkg
        VCPKG_TRIPLET: arm64-ios
        FLUTTER_BUILD_NAME: 1.4.6
        FLUTTER_BUILD_NUMBER: 4067
    scripts:
      - name: Install native build dependencies
        script: |
          brew install nasm yasm
      - name: Install Rust iOS target
        script: |
          rustup default "$RUST_VERSION"
          rustup target add "$CARGO_TARGET"
      - name: Install vcpkg dependencies
        script: |
          cd "$CM_BUILD_DIR"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          git -C "$VCPKG_ROOT" fetch --depth=1 origin "$VCPKG_COMMIT_ID"
          git -C "$VCPKG_ROOT" checkout --force "$VCPKG_COMMIT_ID"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          "$VCPKG_ROOT/vcpkg" install \
            --triplet "$VCPKG_TRIPLET" \
            --x-install-root="$VCPKG_ROOT/installed"
      - name: Flutter dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter pub get
      - name: CocoaPods dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter/ios"
          pod install
      - name: Build Rust iOS static library
        script: |
          cd "$CM_BUILD_DIR"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          cargo build --features flutter,hwcodec --release --target "$CARGO_TARGET" --lib
      - name: Build unsigned iOS app
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter build ios \
            --release \
            --no-codesign \
            --build-name "$FLUTTER_BUILD_NAME" \
            --build-number "$FLUTTER_BUILD_NUMBER"
    artifacts:
      - flutter/build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

  kq-remote-link-ios-ipa:
    name: KQ Remote Link iOS - Signed IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.carriez.flutterHbb
      vars:
        CARGO_TARGET: aarch64-apple-ios
        RUST_VERSION: "1.75"
        VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
        VCPKG_DIR: .codemagic/vcpkg
        VCPKG_TRIPLET: arm64-ios
        FLUTTER_BUILD_NAME: 1.4.6
        FLUTTER_BUILD_NUMBER: 4067
        XCODE_WORKSPACE: flutter/ios/Runner.xcworkspace
        XCODE_PROJECT: Runner.xcodeproj
        XCODE_SCHEME: Runner
    scripts:
      - name: Install native build dependencies
        script: |
          brew install nasm yasm
      - name: Install Rust iOS target
        script: |
          rustup default "$RUST_VERSION"
          rustup target add "$CARGO_TARGET"
      - name: Install vcpkg dependencies
        script: |
          cd "$CM_BUILD_DIR"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          git -C "$VCPKG_ROOT" fetch --depth=1 origin "$VCPKG_COMMIT_ID"
          git -C "$VCPKG_ROOT" checkout --force "$VCPKG_COMMIT_ID"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          "$VCPKG_ROOT/vcpkg" install \
            --triplet "$VCPKG_TRIPLET" \
            --x-install-root="$VCPKG_ROOT/installed"
      - name: Flutter dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter pub get
      - name: CocoaPods dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter/ios"
          pod install
      - name: Build Rust iOS static library
        script: |
          cd "$CM_BUILD_DIR"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          cargo build --features flutter,hwcodec --release --target "$CARGO_TARGET" --lib
      - name: Set up code signing settings
        script: |
          cd "$CM_BUILD_DIR/flutter/ios"
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build signed IPA
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter build ipa \
            --release \
            --build-name "$FLUTTER_BUILD_NAME" \
            --build-number "$FLUTTER_BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - flutter/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
