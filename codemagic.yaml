workflows:
  kq-remote-link-ios-nosign:
    name: KQ Remote Link iOS - No Signing Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      vars:
        CARGO_TARGET: aarch64-apple-ios
        RUST_VERSION: "1.75"
        VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
        VCPKG_DIR: .codemagic/vcpkg
        VCPKG_TRIPLET: arm64-ios
        VCPKG_HOST_TRIPLET: arm64-osx
        FLUTTER_BUILD_NAME: 1.4.6
        FLUTTER_BUILD_NUMBER: 4067
    scripts:
      - name: Install native build dependencies
        script: |
          brew install nasm yasm
      - name: Install Rust iOS target
        script: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$RUST_VERSION" --profile minimal
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default "$RUST_VERSION"
          rustup target add "$CARGO_TARGET"
          rustc --version
          cargo --version
      - name: Install vcpkg dependencies
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          export VCPKG_INSTALLED_ROOT="$VCPKG_ROOT/installed"
          export VCPKG_BINARY_SOURCES=clear
          export VCPKG_DEFAULT_TRIPLET="$VCPKG_TRIPLET"
          export VCPKG_DEFAULT_HOST_TRIPLET="$VCPKG_HOST_TRIPLET"
          export VCPKG_OVERLAY_PORTS="$CM_BUILD_DIR/res/vcpkg"
          export VCPKG_OVERLAY_TRIPLETS="$CM_BUILD_DIR/res/vcpkg/triplets"
          export SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          xcrun --sdk iphoneos --show-sdk-path
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          git -C "$VCPKG_ROOT" fetch --depth=1 origin "$VCPKG_COMMIT_ID"
          git -C "$VCPKG_ROOT" checkout --force "$VCPKG_COMMIT_ID"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          rm -rf "$VCPKG_ROOT/installed/$VCPKG_TRIPLET" "$VCPKG_ROOT/installed/$VCPKG_HOST_TRIPLET"
          "$VCPKG_ROOT/vcpkg" install \
            "libvpx:$VCPKG_TRIPLET" \
            "libyuv:$VCPKG_TRIPLET" \
            "opus:$VCPKG_TRIPLET" \
            --classic \
            --triplet "$VCPKG_TRIPLET" \
            --host-triplet "$VCPKG_HOST_TRIPLET" \
            --overlay-ports "$VCPKG_OVERLAY_PORTS" \
            --overlay-triplets "$VCPKG_OVERLAY_TRIPLETS" \
            --x-install-root="$VCPKG_INSTALLED_ROOT"
          bash "$CM_BUILD_DIR/scripts/ci/verify-ios-vcpkg-libraries.sh"
      - name: Flutter dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter pub get
      - name: CocoaPods dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter/ios"
          pod install
      - name: Build Rust iOS static library
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          export PATH="$HOME/.cargo/bin:$PATH"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          export VCPKG_INSTALLED_ROOT="$VCPKG_ROOT/installed"
          export VCPKG_BINARY_SOURCES=clear
          export VCPKG_DEFAULT_TRIPLET="$VCPKG_TRIPLET"
          export VCPKG_DEFAULT_HOST_TRIPLET="$VCPKG_HOST_TRIPLET"
          export SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          cargo build --features flutter --release --target "$CARGO_TARGET" --lib
      - name: Build unsigned iOS app
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter build ios \
            --release \
            --no-codesign \
            --build-name "$FLUTTER_BUILD_NAME" \
            --build-number "$FLUTTER_BUILD_NUMBER"
    artifacts:
      - flutter/build/ios/iphoneos/Runner.app
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

  kq-remote-link-ios-testflight:
    name: KQ Remote Link iOS - TestFlight
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - appstore_credentials
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kunqiong.remotelink
      vars:
        CARGO_TARGET: aarch64-apple-ios
        RUST_VERSION: "1.75"
        VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
        VCPKG_DIR: .codemagic/vcpkg
        VCPKG_TRIPLET: arm64-ios
        VCPKG_HOST_TRIPLET: arm64-osx
        FLUTTER_BUILD_NAME: 1.4.6
        FLUTTER_BUILD_NUMBER: 4067
        XCODE_WORKSPACE: flutter/ios/Runner.xcworkspace
        XCODE_PROJECT: Runner.xcodeproj
        XCODE_SCHEME: Runner
    scripts:
      - name: Install native build dependencies
        script: |
          brew install nasm yasm
      - name: Install Rust iOS target
        script: |
          if ! command -v rustup >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$RUST_VERSION" --profile minimal
          fi
          export PATH="$HOME/.cargo/bin:$PATH"
          rustup default "$RUST_VERSION"
          rustup target add "$CARGO_TARGET"
          rustc --version
          cargo --version
      - name: Install vcpkg dependencies
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          export VCPKG_INSTALLED_ROOT="$VCPKG_ROOT/installed"
          export VCPKG_BINARY_SOURCES=clear
          export VCPKG_DEFAULT_TRIPLET="$VCPKG_TRIPLET"
          export VCPKG_DEFAULT_HOST_TRIPLET="$VCPKG_HOST_TRIPLET"
          export VCPKG_OVERLAY_PORTS="$CM_BUILD_DIR/res/vcpkg"
          export VCPKG_OVERLAY_TRIPLETS="$CM_BUILD_DIR/res/vcpkg/triplets"
          export SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          xcrun --sdk iphoneos --show-sdk-path
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            rm -rf "$VCPKG_ROOT"
            git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
          fi
          git -C "$VCPKG_ROOT" fetch --depth=1 origin "$VCPKG_COMMIT_ID"
          git -C "$VCPKG_ROOT" checkout --force "$VCPKG_COMMIT_ID"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          rm -rf "$VCPKG_ROOT/installed/$VCPKG_TRIPLET" "$VCPKG_ROOT/installed/$VCPKG_HOST_TRIPLET"
          "$VCPKG_ROOT/vcpkg" install \
            "libvpx:$VCPKG_TRIPLET" \
            "libyuv:$VCPKG_TRIPLET" \
            "opus:$VCPKG_TRIPLET" \
            --classic \
            --triplet "$VCPKG_TRIPLET" \
            --host-triplet "$VCPKG_HOST_TRIPLET" \
            --overlay-ports "$VCPKG_OVERLAY_PORTS" \
            --overlay-triplets "$VCPKG_OVERLAY_TRIPLETS" \
            --x-install-root="$VCPKG_INSTALLED_ROOT"
          bash "$CM_BUILD_DIR/scripts/ci/verify-ios-vcpkg-libraries.sh"
      - name: Flutter dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter pub get
      - name: CocoaPods dependencies
        script: |
          cd "$CM_BUILD_DIR/flutter/ios"
          pod install
      - name: Build Rust iOS static library
        script: |
          set -euo pipefail
          cd "$CM_BUILD_DIR"
          export PATH="$HOME/.cargo/bin:$PATH"
          export VCPKG_ROOT="$CM_BUILD_DIR/$VCPKG_DIR"
          export VCPKG_INSTALLED_ROOT="$VCPKG_ROOT/installed"
          export VCPKG_BINARY_SOURCES=clear
          export VCPKG_DEFAULT_TRIPLET="$VCPKG_TRIPLET"
          export VCPKG_DEFAULT_HOST_TRIPLET="$VCPKG_HOST_TRIPLET"
          export SDKROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          cargo build --features flutter --release --target "$CARGO_TARGET" --lib
      - name: Set up code signing settings
        script: |
          cd "$CM_BUILD_DIR/flutter/ios"
          xcode-project use-profiles --project "$XCODE_PROJECT"
      - name: Build signed IPA
        script: |
          cd "$CM_BUILD_DIR/flutter"
          flutter build ipa \
            --release \
            --build-name "$FLUTTER_BUILD_NAME" \
            --build-number "$FLUTTER_BUILD_NUMBER" \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - flutter/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
