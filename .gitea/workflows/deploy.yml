name: Deploy KQ Remote Link Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: linux:host
    env:
      PROJECT_NAME: KQromoteLink
      INSTALL_DIR: /www/wwwroot/KQromoteLink
      PUBLIC_HOST: 43.154.197.96
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD

      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          test -f deploy/rustdesk-server.compose.yml
          test -f deploy/deploy-rustdesk-server.sh
          test -f deploy/check-rustdesk-server.sh
          test -f deploy/export-hbbs-public-key.sh
          test -f scripts/deploy/deploy.sh
          test -f server/package.json
          test -f server/src/index.js
          test -f server/Dockerfile
          bash -n deploy/deploy-rustdesk-server.sh
          bash -n deploy/check-rustdesk-server.sh
          bash -n deploy/export-hbbs-public-key.sh
          bash -n scripts/deploy/deploy.sh
          if command -v node >/dev/null 2>&1; then
            node --check server/src/index.js
          fi
          compose_tmp="$(mktemp -d)"
          cp deploy/rustdesk-server.compose.yml "${compose_tmp}/rustdesk-server.compose.yml"
          mkdir -p "${compose_tmp}/api"
          cp -R server/. "${compose_tmp}/api/"
          cat > "${compose_tmp}/.env" <<'ENV'
          KQ_DB_HOST=127.0.0.1
          KQ_DB_PORT=23306
          KQ_DB_USER=kq_remote_link
          KQ_DB_PASSWORD=kq
          KQ_DB_NAME=kq_remote_link
          KQ_DB_CREATE_DATABASE=N
          ENV
          if docker compose version >/dev/null 2>&1; then
            (cd "${compose_tmp}" && docker compose -f rustdesk-server.compose.yml config >/dev/null)
          elif command -v docker-compose >/dev/null 2>&1; then
            (cd "${compose_tmp}" && docker-compose -f rustdesk-server.compose.yml config >/dev/null)
          else
            echo "docker compose is not installed on this runner; deploy step will fail if the target host also lacks it."
          fi
          rm -rf "${compose_tmp}"

      - name: Deploy
        shell: bash
        env:
          KQ_HBBS_PUBLIC_KEY: ${{ secrets.KQ_HBBS_PUBLIC_KEY }}
          KQ_HBBS_SECRET_KEY: ${{ secrets.KQ_HBBS_SECRET_KEY }}
          KQ_ENABLE_API: "Y"
          KQ_API_PORT: ${{ secrets.KQ_API_PORT }}
          KQ_API_PUBLIC_PATH: /kq-api
          KQ_PUBLIC_API_URL: http://43.154.197.96/kq-api/api
          KQ_DB_HOST: ${{ secrets.KQ_DB_HOST }}
          KQ_DB_PORT: ${{ secrets.KQ_DB_PORT }}
          KQ_DB_USER: ${{ secrets.KQ_DB_USER }}
          KQ_DB_PASSWORD: ${{ secrets.KQ_DB_PASSWORD }}
          KQ_DB_NAME: ${{ secrets.KQ_DB_NAME }}
        run: bash scripts/deploy/deploy.sh
