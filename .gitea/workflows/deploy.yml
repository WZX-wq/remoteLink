name: Deploy KQ Remote Link Server

on:
  push:
    branches:
      - main
      - master
      - codex/**
  workflow_dispatch:

jobs:
  deploy:
    runs-on: linux
    env:
      PROJECT_NAME: KQromoteLink
      INSTALL_DIR: /www/wwwroot/KQromoteLink
      PUBLIC_HOST: remotelink.kunqiongai.com
    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD

      - name: Validate
        shell: bash
        run: |
          set -euo pipefail
          test -f deploy/rustdesk-server.compose.yml
          test -f deploy/deploy-rustdesk-server.sh
          test -f deploy/check-rustdesk-server.sh
          test -f deploy/export-hbbs-public-key.sh
          test -f scripts/deploy/deploy.sh
          test -f server/package.json
          test -f server/src/index.js
          test -f server/Dockerfile
          test -f server/public/downloads/Kunqiong-Remote-Desktop-Setup.exe
          bash -n deploy/deploy-rustdesk-server.sh
          bash -n deploy/check-rustdesk-server.sh
          bash -n deploy/export-hbbs-public-key.sh
          bash -n scripts/deploy/deploy.sh
          if command -v node >/dev/null 2>&1; then
            node --check server/src/index.js
          fi
          compose_tmp="$(mktemp -d)"
          cp deploy/rustdesk-server.compose.yml "${compose_tmp}/rustdesk-server.compose.yml"
          mkdir -p "${compose_tmp}/api"
          cp -R server/. "${compose_tmp}/api/"
          cat > "${compose_tmp}/.env" <<'ENV'
          KQ_DB_HOST=127.0.0.1
          KQ_DB_PORT=23306
          KQ_DB_USER=kq_remote_link
          KQ_DB_PASSWORD=kq
          KQ_DB_NAME=kq_remote_link
          KQ_DB_CREATE_DATABASE=N
          ENV
          if docker compose version >/dev/null 2>&1; then
            (cd "${compose_tmp}" && docker compose -f rustdesk-server.compose.yml config >/dev/null)
          elif command -v docker-compose >/dev/null 2>&1; then
            (cd "${compose_tmp}" && docker-compose -f rustdesk-server.compose.yml config >/dev/null)
          else
            echo "docker compose is not installed on this runner; deploy step will fail if the target host also lacks it."
          fi
          rm -rf "${compose_tmp}"

      - name: Deploy
        shell: bash
        env:
          KQ_HBBS_PUBLIC_KEY: ${{ secrets.KQ_HBBS_PUBLIC_KEY }}
          KQ_HBBS_SECRET_KEY: ${{ secrets.KQ_HBBS_SECRET_KEY }}
          KQ_ENABLE_API: "Y"
          KQ_API_PORT: ${{ secrets.KQ_API_PORT }}
          KQ_API_PUBLIC_PATH: /kq-api
          KQ_PUBLIC_API_URL: https://remotelink.kunqiongai.com/kq-api/api
          KQ_DOWNLOAD_URL: https://remotelink.kunqiongai.com/kq-api/download/windows
          KQ_DOWNLOAD_FILE_PATH: /app/public/downloads/Kunqiong-Remote-Desktop-Setup.exe
          KQ_DOWNLOAD_FILE_NAME: Kunqiong-Remote-Desktop-Setup.exe
          KQ_DOWNLOAD_VERSION: 2026.06.26.2060
          KQ_DOWNLOAD_SHA256: 4C3E608C6AF09F6BEE70597DA0691253F0771C0E1E6F7CD8200F87A05826341A
          KQ_ANDROID_DOWNLOAD_URL: https://remotelink.kunqiongai.com/kq-api/download/android
          KQ_ANDROID_DOWNLOAD_FILE_PATH: /app/public/downloads/Kunqiong-Remote-Desktop.apk
          KQ_ANDROID_DOWNLOAD_FILE_NAME: Kunqiong-Remote-Desktop.apk
          KQ_DOWNLOAD_MAX_REQUESTS_PER_WINDOW: "12"
          KQ_DOWNLOAD_RATE_WINDOW_MS: "60000"
          KQ_DOWNLOAD_MAX_PER_IP_CONCURRENT: "2"
          KQ_DOWNLOAD_MAX_GLOBAL_CONCURRENT: "8"
          KQ_APP_SCHEME: kqremote
          KQ_DB_HOST: ${{ secrets.KQ_DB_HOST }}
          KQ_DB_PORT: ${{ secrets.KQ_DB_PORT }}
          KQ_DB_USER: ${{ secrets.KQ_DB_USER }}
          KQ_DB_PASSWORD: ${{ secrets.KQ_DB_PASSWORD }}
          KQ_DB_NAME: ${{ secrets.KQ_DB_NAME }}
          KQ_ALIPAY_APP_ID: ${{ secrets.KQ_ALIPAY_APP_ID }}
          KQ_ALIPAY_PRIVATE_KEY: ${{ secrets.KQ_ALIPAY_PRIVATE_KEY }}
          KQ_ALIPAY_PUBLIC_KEY: ${{ secrets.KQ_ALIPAY_PUBLIC_KEY }}
          KQ_ALIPAY_NOTIFY_URL: ${{ secrets.KQ_ALIPAY_NOTIFY_URL }}
          KQ_ALIPAY_GATEWAY_URL: ${{ secrets.KQ_ALIPAY_GATEWAY_URL }}
        run: bash scripts/deploy/deploy.sh
