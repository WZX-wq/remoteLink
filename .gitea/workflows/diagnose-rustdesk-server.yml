name: Diagnose KQ RustDesk Server

on:
  workflow_dispatch:
  push:
    branches:
      - diagnose-rustdesk-server
      - diagnose-rustdesk-server-*

jobs:
  diagnose:
    runs-on: linux
    env:
      INSTALL_DIR: /www/wwwroot/KQromoteLink
    steps:
      - name: Diagnose
        shell: bash
        run: |
          set -euo pipefail
          echo "== host =="
          hostname
          id
          date -Is
          echo ""
          echo "== install dir =="
          ls -la "${INSTALL_DIR}" || true
          ls -la "${INSTALL_DIR}/data" || true
          echo ""
          echo "== public key =="
          if test -s "${INSTALL_DIR}/data/id_ed25519.pub"; then
            cat "${INSTALL_DIR}/data/id_ed25519.pub"
          else
            echo "missing ${INSTALL_DIR}/data/id_ed25519.pub"
          fi
          echo ""
          echo "== compose ps =="
          cd "${INSTALL_DIR}"
          if docker compose version >/dev/null 2>&1; then
            docker compose -f rustdesk-server.compose.yml ps || true
            docker compose -f rustdesk-server.compose.yml images || true
          else
            docker-compose -f rustdesk-server.compose.yml ps || true
            docker-compose -f rustdesk-server.compose.yml images || true
          fi
          echo ""
          echo "== container inspect =="
          docker inspect kq-remote-link-hbbs kq-remote-link-hbbr \
            --format '{{.Name}} image={{.Config.Image}} cmd={{json .Config.Cmd}} state={{.State.Status}} started={{.State.StartedAt}}' || true
          docker inspect kq-remote-link-api \
            --format '{{.Name}} image={{.Config.Image}} cmd={{json .Config.Cmd}} state={{.State.Status}} started={{.State.StartedAt}}' || true
          echo ""
          echo "== systemd services =="
          systemctl --no-pager --full status kq-remote-link-hbbr.service kq-remote-link-hbbs.service kq-remote-link-api.service kq-remote-link-watchdog.timer kq-remote-link-watchdog.service || true
          echo ""
          echo "== systemd recent journal =="
          journalctl --no-pager --since "20 minutes ago" -u kq-remote-link-hbbr.service -u kq-remote-link-hbbs.service -u kq-remote-link-api.service -u kq-remote-link-watchdog.service || true
          echo ""
          echo "== external docker guard =="
          cat /etc/kaixinniao/test-slot.conf 2>/dev/null || true
          systemctl --no-pager --full status kaixinniao-docker-guard.service 2>/dev/null || true
          journalctl --no-pager --since "20 minutes ago" -u kaixinniao-docker-guard.service 2>/dev/null || true
          echo ""
          echo "== docker events recent =="
          timeout 3 docker events --since 20m --until 0s --filter container=kq-remote-link-hbbs --filter container=kq-remote-link-hbbr --filter container=kq-remote-link-api || true
          echo ""
          echo "== listeners =="
          ss -lntup | awk 'NR == 1 || /:21115|:21116|:21117|:21118|:21119/' || true
          echo ""
          echo "== active rustdesk server connections =="
          ss -ntup | awk 'NR == 1 || /:21115|:21116|:21117|:21118|:21119/' || true
          echo ""
          echo "== recent logs =="
          if docker compose version >/dev/null 2>&1; then
            docker compose -f rustdesk-server.compose.yml logs --tail=500 hbbs hbbr || true
          else
            docker-compose -f rustdesk-server.compose.yml logs --tail=500 hbbs hbbr || true
          fi
