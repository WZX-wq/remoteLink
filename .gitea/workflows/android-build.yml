name: Build KQ Remote Link Android

on:
  push:
    branches:
      - main
      - codex/**
  workflow_dispatch:

jobs:
  build-android:
    runs-on: linux:host
    env:
      FLUTTER_VERSION: "3.24.5"
      RUST_VERSION: "1.75"
      CARGO_NDK_VERSION: "3.1.2"
      NDK_PACKAGE_VERSION: "28.2.13676358"
      FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
      PUB_HOSTED_URL: https://pub.flutter-io.cn
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
      VCPKG_ROOT: /opt/artifacts/vcpkg
      ANDROID_SDK_ROOT: /opt/artifacts/android-sdk
      ANDROID_API_LEVEL: "21"
      ANDROID_ABI: arm64-v8a
      BUILD_MODE: release
      CARGO_FEATURES: flutter,hwcodec,vram
      ANDROID_JNI_LIB_DIR: flutter/android/app/src/main/jniLibs
      FLUTTER_ROOT: /opt/artifacts/flutter/3.24.5

    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d .git ]]; then
            git remote set-url origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          else
            git init .
            git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          fi
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Prepare build tools
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if command -v sudo >/dev/null 2>&1; then
            APT="sudo apt-get"
          else
            APT="apt-get"
          fi
          ${APT} update
          ${APT} install -y \
            autoconf \
            automake \
            clang \
            cmake \
            curl \
            file \
            git \
            g++ \
            gettext \
            libclang-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            liblzma-dev \
            libssl-dev \
            libtool \
            nasm \
            ninja-build \
            openjdk-17-jdk-headless \
            pkg-config \
            python3 \
            unzip \
            wget \
            xz-utils \
            zip

      - name: Build APK and AAB
        shell: bash
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: |
          set -euo pipefail
          export PATH="${JAVA_HOME}/bin:${HOME}/.cargo/bin:${PATH}"
          export ANDROID_HOME="${ANDROID_SDK_ROOT}"
          export ANDROID_NDK_HOME="${ANDROID_SDK_ROOT}/ndk/${NDK_PACKAGE_VERSION}"
          export ANDROID_NDK_ROOT="${ANDROID_NDK_HOME}"
          export ANDROID_NDK="${ANDROID_NDK_HOME}"

          install_flutter() {
            mkdir -p "$(dirname "${FLUTTER_ROOT}")"
            if [[ ! -d "${FLUTTER_ROOT}/.git" ]]; then
              rm -rf "${FLUTTER_ROOT}"
              git clone --depth=1 --branch "${FLUTTER_VERSION}" https://github.com/flutter/flutter.git "${FLUTTER_ROOT}"
            fi
            export PATH="${FLUTTER_ROOT}/bin:${PATH}"
            cd "${FLUTTER_ROOT}"
            git fetch --depth=1 origin "refs/tags/${FLUTTER_VERSION}:refs/tags/${FLUTTER_VERSION}" || true
            git checkout --force "${FLUTTER_VERSION}"
            patch_file="${GITHUB_WORKSPACE}/.github/patches/flutter_3.24.4_dropdown_menu_enableFilter.diff"
            if git apply --reverse --check "${patch_file}" >/dev/null 2>&1; then
              echo "Flutter patch already applied"
            else
              git apply "${patch_file}"
            fi
            flutter config --no-analytics
            flutter --version
            cd "${GITHUB_WORKSPACE}"
          }

          install_android_sdk() {
            mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
            if [[ ! -x "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" ]]; then
              tmp_dir="$(mktemp -d)"
              curl -L --retry 5 --retry-delay 5 \
                -o "${tmp_dir}/cmdline-tools.zip" \
                https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
              unzip -q "${tmp_dir}/cmdline-tools.zip" -d "${tmp_dir}"
              rm -rf "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
              mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
              mv "${tmp_dir}/cmdline-tools/"* "${ANDROID_SDK_ROOT}/cmdline-tools/latest/"
              rm -rf "${tmp_dir}"
            fi
            export PATH="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin:${ANDROID_SDK_ROOT}/platform-tools:${PATH}"
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager \
              "platform-tools" \
              "platforms;android-34" \
              "build-tools;34.0.0" \
              "ndk;${NDK_PACKAGE_VERSION}"
            test -x "${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          }

          install_vcpkg() {
            mkdir -p "$(dirname "${VCPKG_ROOT}")"
            if [[ ! -d "${VCPKG_ROOT}/.git" ]]; then
              rm -rf "${VCPKG_ROOT}"
              git clone https://github.com/microsoft/vcpkg.git "${VCPKG_ROOT}"
            fi
            git -C "${VCPKG_ROOT}" fetch --depth=1 origin "${VCPKG_COMMIT_ID}"
            git -C "${VCPKG_ROOT}" checkout --force "${VCPKG_COMMIT_ID}"
            "${VCPKG_ROOT}/bootstrap-vcpkg.sh" -disableMetrics
            test -x "${VCPKG_ROOT}/vcpkg"
          }

          install_rust() {
            if ! command -v rustup >/dev/null 2>&1; then
              curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain "${RUST_VERSION}" --profile minimal
              export PATH="${HOME}/.cargo/bin:${PATH}"
            fi
            rustup toolchain install "${RUST_VERSION}" --profile minimal --component rustfmt
            rustup default "${RUST_VERSION}"
            rustup target add aarch64-linux-android
            if ! cargo ndk --version 2>/dev/null | grep -q "${CARGO_NDK_VERSION}"; then
              cargo install cargo-ndk --version "${CARGO_NDK_VERSION}" --locked
            fi
          }

          compute_version() {
            version_line="$(grep -E '^version:' flutter/pubspec.yaml | head -n 1 | sed 's/^version:[[:space:]]*//')"
            BUILD_NAME="${version_line%%+*}"
            BUILD_NUMBER="${version_line##*+}"
            if [[ "${version_line}" == "${BUILD_NAME}" ]]; then
              BUILD_NUMBER="$(git rev-list --count HEAD)"
            fi
            export BUILD_NAME BUILD_NUMBER
            case "${BUILD_MODE}" in
              release|profile|debug) ;;
              *)
                echo "Unsupported Android build mode: ${BUILD_MODE}" >&2
                exit 1
              ;;
            esac
          }

          build_native_libs() {
            if ! ./flutter/build_android_deps.sh "${ANDROID_ABI}"; then
              find "${VCPKG_ROOT}/" -name "*.log" | while read -r log_file; do
                echo "${log_file}:"
                echo "======"
                cat "${log_file}"
                echo "======"
                echo ""
              done
              exit 1
            fi

            ndk_prebuilt_dir="${ANDROID_NDK_HOME}/toolchains/llvm/prebuilt"
            ndk_host_tag=""
            for candidate in linux-x86_64 windows-x86_64 darwin-arm64 darwin-x86_64; do
              if [[ -d "${ndk_prebuilt_dir}/${candidate}" ]]; then
                ndk_host_tag="${candidate}"
                break
              fi
            done
            if [[ -z "${ndk_host_tag}" ]]; then
              echo "Android NDK LLVM prebuilt directory was not found under ${ndk_prebuilt_dir}" >&2
              ls -1 "${ndk_prebuilt_dir}" >&2 || true
              exit 1
            fi
            ndk_prebuilt="${ndk_prebuilt_dir}/${ndk_host_tag}"
            llvm_strip="${ndk_prebuilt}/bin/llvm-strip"
            if [[ ! -x "${llvm_strip}" && -x "${llvm_strip}.exe" ]]; then
              llvm_strip="${llvm_strip}.exe"
            fi
            test -x "${llvm_strip}"

            bash ./flutter/ndk_arm64.sh
            jni_dir="${ANDROID_JNI_LIB_DIR}/${ANDROID_ABI}"
            mkdir -p "${jni_dir}"
            cp target/aarch64-linux-android/release/liblibrustdesk.so "${jni_dir}/librustdesk.so"
            cp "${ndk_prebuilt}/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" "${jni_dir}/"
            "${llvm_strip}" "${jni_dir}/librustdesk.so"
            "${llvm_strip}" "${jni_dir}/libc++_shared.so"
            test -s "${jni_dir}/librustdesk.so"
            test -s "${jni_dir}/libc++_shared.so"
          }

          build_flutter_artifacts() {
            pushd flutter
            flutter pub get
            flutter analyze --no-fatal-infos \
              lib/common/widgets/login.dart \
              lib/mobile/pages/home_page.dart \
              lib/mobile/pages/connection_page.dart \
              lib/mobile/pages/account_page.dart \
              lib/mobile/pages/settings_page.dart \
              lib/mobile/pages/server_page.dart \
              lib/mobile/pages/remote_page.dart \
              lib/mobile/pages/file_manager_page.dart

            extra_args=()
            if [[ "${BUILD_MODE}" == "release" ]]; then
              extra_args+=(--obfuscate --split-debug-info=./split-debug-info)
            fi
            flutter build apk --${BUILD_MODE} --build-name "${BUILD_NAME}" --build-number "${BUILD_NUMBER}" --target-platform android-arm64 --split-per-abi "${extra_args[@]}"
            flutter build appbundle --${BUILD_MODE} --build-name "${BUILD_NAME}" --build-number "${BUILD_NUMBER}" --target-platform android-arm64 "${extra_args[@]}"
            mkdir -p ../artifacts
            cp "build/app/outputs/flutter-apk/app-arm64-v8a-${BUILD_MODE}.apk" "../artifacts/Kunqiong-Remote-Desktop-Android-arm64-v8a-${BUILD_MODE}.apk"
            aab_path="$(find build/app/outputs -name '*.aab' | sort | tail -n 1)"
            cp "${aab_path}" "../artifacts/Kunqiong-Remote-Desktop-Android-arm64-v8a-${BUILD_MODE}.aab"
            popd
          }

          verify_artifacts() {
            apk_path="artifacts/Kunqiong-Remote-Desktop-Android-arm64-v8a-${BUILD_MODE}.apk"
            aab_path="artifacts/Kunqiong-Remote-Desktop-Android-arm64-v8a-${BUILD_MODE}.aab"
            jar tf "${apk_path}" > /tmp/kq-apk-files.txt
            jar tf "${aab_path}" > /tmp/kq-aab-files.txt

            grep -q '^lib/arm64-v8a/librustdesk\.so$' /tmp/kq-apk-files.txt
            grep -q '^lib/arm64-v8a/libc++_shared\.so$' /tmp/kq-apk-files.txt
            grep -q '^lib/arm64-v8a/libapp\.so$' /tmp/kq-apk-files.txt
            grep -q '^lib/arm64-v8a/libflutter\.so$' /tmp/kq-apk-files.txt

            grep -q '^base/lib/arm64-v8a/librustdesk\.so$' /tmp/kq-aab-files.txt
            grep -q '^base/lib/arm64-v8a/libc++_shared\.so$' /tmp/kq-aab-files.txt
            grep -q '^base/lib/arm64-v8a/libapp\.so$' /tmp/kq-aab-files.txt
            grep -q '^base/lib/arm64-v8a/libflutter\.so$' /tmp/kq-aab-files.txt

            sha256sum "${apk_path}" "${aab_path}" | tee artifacts/SHA256SUMS.txt
          }

          install_flutter
          install_android_sdk
          install_vcpkg
          install_rust
          compute_version
          build_native_libs
          build_flutter_artifacts
          verify_artifacts

      - name: Deploy Android artifacts
        shell: bash
        env:
          ARTIFACT_DIR: artifacts
          OUTPUT_DIR: /www/wwwroot/KQromoteLink/android
        run: |
          set -euo pipefail
          chmod +x scripts/deploy/deploy-android.sh
          bash scripts/deploy/deploy-android.sh
