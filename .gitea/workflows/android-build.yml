name: Build KQ Remote Link Android

on:
  push:
    branches:
      - main
      - codex/**
  workflow_dispatch:

jobs:
  build-android:
    # The active Android runner is currently registered with the linux label.
    # linux:host stays on server deployment workflows, but leaves this job waiting.
    runs-on: linux
    env:
      FLUTTER_VERSION: "3.24.5"
      RUST_VERSION: "1.75"
      CARGO_NDK_VERSION: "3.1.2"
      NDK_PACKAGE_VERSION: "28.2.13676358"
      FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn
      PUB_HOSTED_URL: https://pub.flutter-io.cn
      VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
      VCPKG_ROOT: /opt/artifacts/vcpkg
      CMAKE_VERSION: "3.30.1"
      CMAKE_ROOT: /opt/artifacts/cmake/3.30.1
      NINJA_VERSION: "1.12.1"
      NINJA_ROOT: /opt/artifacts/ninja/1.12.1
      ANDROID_SDK_ROOT: /opt/artifacts/android-sdk
      ANDROID_API_LEVEL: "21"
      ANDROID_ABI: arm64-v8a
      BUILD_MODE: release
      # Fast test packages are the normal CI output on the test server.
      # Store-ready AAB/analyze can be re-enabled by setting these to Y.
      KQ_ANDROID_BUILD_KIND: fast
      KQ_ANDROID_BUILD_AAB: "N"
      KQ_ANDROID_RUN_ANALYZE: "N"
      # Android F-Droid build uses flutter,hwcodec for arm64. vram is Windows-focused.
      CARGO_FEATURES: flutter,hwcodec
      CARGO_TARGET_DIR: /opt/artifacts/kq-remote-link/cargo-target/android-aarch64
      CARGO_INCREMENTAL: "1"
      ANDROID_JNI_LIB_DIR: flutter/android/app/src/main/jniLibs
      FLUTTER_ROOT: /opt/artifacts/flutter/3.24.5
      CI_ARTIFACT_DIR: artifacts/ci
      PUBLIC_CI_DIR: /www/wwwroot/KQromoteLink/android/ci
      KQ_ANDROID_KEYSTORE_BASE64: ${{ secrets.KQ_ANDROID_KEYSTORE_BASE64 }}
      KQ_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KQ_ANDROID_KEYSTORE_PASSWORD }}
      KQ_ANDROID_KEY_ALIAS: ${{ secrets.KQ_ANDROID_KEY_ALIAS }}
      KQ_ANDROID_KEY_PASSWORD: ${{ secrets.KQ_ANDROID_KEY_PASSWORD }}
      KQ_ANDROID_EXPECTED_CERT_MD5: "037ec2069ddb32f065626cbb2b17dba9"

    steps:
      - name: Checkout
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d .git ]]; then
            git remote set-url origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          else
            git init .
            git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          fi
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD
          git submodule sync --recursive
          git submodule update --init --recursive
          bash scripts/ci/apply-hbb-common-patch.sh

      - name: Prepare build tools
        shell: bash
        run: bash scripts/ci/android-build-step.sh prepare-build-tools

      - name: Install CMake and Ninja
        shell: bash
        run: bash scripts/ci/android-build-step.sh install-build-system-tools

      - name: Install Flutter
        shell: bash
        run: bash scripts/ci/android-build-step.sh install-flutter

      - name: Install Android SDK
        shell: bash
        run: bash scripts/ci/android-build-step.sh install-android-sdk

      - name: Install vcpkg
        shell: bash
        run: bash scripts/ci/android-build-step.sh install-vcpkg

      - name: Install Rust toolchain
        shell: bash
        run: bash scripts/ci/android-build-step.sh install-rust

      - name: Compute Android version
        shell: bash
        run: bash scripts/ci/android-build-step.sh compute-version

      - name: Build Android native dependencies
        shell: bash
        run: bash scripts/ci/android-build-step.sh build-native-deps

      - name: Build Rust Android library
        shell: bash
        run: bash scripts/ci/android-build-step.sh build-rust-library

      - name: Fetch Flutter packages
        shell: bash
        run: bash scripts/ci/android-build-step.sh flutter-pub-get

      - name: Analyze mobile Flutter code
        shell: bash
        run: bash scripts/ci/android-build-step.sh analyze-mobile

      - name: Build APK and AAB
        shell: bash
        run: bash scripts/ci/android-build-step.sh build-flutter-artifacts

      - name: Verify Android artifacts
        shell: bash
        run: bash scripts/ci/android-build-step.sh verify-artifacts

      - name: Deploy Android artifacts
        shell: bash
        env:
          ARTIFACT_DIR: artifacts
          OUTPUT_DIR: /www/wwwroot/KQromoteLink/android
          KQ_ANDROID_DOWNLOAD_VERSION: 1.4.6+2067
        run: |
          set -euo pipefail
          chmod +x scripts/deploy/deploy-android.sh
          API_DOWNLOAD_DIR=/www/wwwroot/KQromoteLink/api/public/downloads \
            bash scripts/deploy/deploy-android.sh

      - name: Record Android build success
        shell: bash
        run: bash scripts/ci/android-build-step.sh record-success

      - name: Publish Android CI diagnostics
        if: always()
        shell: bash
        run: bash scripts/ci/android-build-step.sh publish-diagnostics
