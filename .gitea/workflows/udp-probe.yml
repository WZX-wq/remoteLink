name: Probe KQ RustDesk UDP

on:
  push:
    branches:
      - udp-probe
  workflow_dispatch:

jobs:
  probe:
    runs-on: linux
    steps:
      - name: Capture UDP 21116
        shell: bash
        run: |
          set -euo pipefail
          echo "== UDP probe start =="
          date -Is
          echo "host: $(hostname)"
          echo "interfaces:"
          ip -br addr || true
          echo ""
          if command -v tcpdump >/dev/null 2>&1; then
            echo "tcpdump available"
            timeout 90s tcpdump -ni any -vv 'udp port 21116' || true
          else
            echo "tcpdump is not installed; showing UDP listeners only"
            ss -lunp | awk 'NR == 1 || /:21116/' || true
            sleep 90
          fi
          echo "== UDP probe end =="
          date -Is
